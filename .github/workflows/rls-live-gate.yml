name: RLS Live Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rls-live-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rls-live-gate:
    name: RLS Live Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      APP_ENV: rls-live-gate
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUN_RLS_TESTS: "true"
      RLS_TEST_SUPABASE_URL: ${{ vars.RLS_TEST_SUPABASE_URL }}
      RLS_TEST_SUPABASE_ANON_KEY: ${{ secrets.RLS_TEST_SUPABASE_ANON_KEY }}
      RLS_TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RLS_TEST_SUPABASE_SERVICE_ROLE_KEY }}
      RLS_TEST_USER_A_EMAIL: ${{ secrets.RLS_TEST_USER_A_EMAIL }}
      RLS_TEST_USER_A_PASSWORD: ${{ secrets.RLS_TEST_USER_A_PASSWORD }}
      RLS_TEST_USER_B_EMAIL: ${{ secrets.RLS_TEST_USER_B_EMAIL }}
      RLS_TEST_USER_B_PASSWORD: ${{ secrets.RLS_TEST_USER_B_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate RLS live gate environment
        id: validate_rls_env
        shell: bash
        run: |
          missing=0

          require_env() {
            local name="$1"
            local value="${!name}"

            if [ -z "$value" ]; then
              echo "::error title=Missing RLS live gate environment::$name must be configured for the dedicated RLS Supabase test environment."
              missing=1
            fi
          }

          require_env RLS_TEST_SUPABASE_URL
          require_env RLS_TEST_SUPABASE_ANON_KEY
          require_env RLS_TEST_SUPABASE_SERVICE_ROLE_KEY
          require_env RLS_TEST_USER_A_EMAIL
          require_env RLS_TEST_USER_A_PASSWORD
          require_env RLS_TEST_USER_B_EMAIL
          require_env RLS_TEST_USER_B_PASSWORD

          if [ "$RUN_RLS_TESTS" != "true" ]; then
            echo "::error title=Invalid RLS flag::RUN_RLS_TESTS must be true inside the dedicated RLS Live Gate."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run RLS gated tests
        run: npm run test

      - name: Write RLS live gate evidence summary
        if: always()
        shell: bash
        env:
          RLS_ENV_VALIDATION_OUTCOME: ${{ steps.validate_rls_env.outcome }}
        run: |
          mkdir -p rls-live-gate-evidence

          {
            echo "# RLS Live Gate Evidence"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Workflow | ${GITHUB_WORKFLOW} |"
            echo "| Run ID | ${GITHUB_RUN_ID} |"
            echo "| Run attempt | ${GITHUB_RUN_ATTEMPT} |"
            echo "| Ref | ${GITHUB_REF} |"
            echo "| SHA | ${GITHUB_SHA} |"
            echo "| Actor | ${GITHUB_ACTOR} |"
            echo "| Event | ${GITHUB_EVENT_NAME} |"
            echo "| APP_ENV | ${APP_ENV} |"
            echo "| RUN_RLS_TESTS | ${RUN_RLS_TESTS} |"
            echo "| Environment validation outcome | ${RLS_ENV_VALIDATION_OUTCOME} |"
            echo "| Test command when validation passes | npm run test |"
            echo
            echo "## Environment contract"
            echo
            echo "- RLS_TEST_SUPABASE_URL: required repository variable"
            echo "- RLS_TEST_SUPABASE_ANON_KEY: required secret"
            echo "- RLS_TEST_SUPABASE_SERVICE_ROLE_KEY: required secret"
            echo "- RLS_TEST_USER_A_EMAIL: required secret"
            echo "- RLS_TEST_USER_A_PASSWORD: required secret"
            echo "- RLS_TEST_USER_B_EMAIL: required secret"
            echo "- RLS_TEST_USER_B_PASSWORD: required secret"
            echo
            echo "Secret values are intentionally not printed."
          } > rls-live-gate-evidence/summary.md

          cat rls-live-gate-evidence/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload RLS live gate evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-live-gate-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: rls-live-gate-evidence/
          retention-days: 30
