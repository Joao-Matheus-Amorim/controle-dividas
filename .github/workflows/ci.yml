name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://familyfinance-ci.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      ADMIN_EMAIL: admin@example.com
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_ENV: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit critical vulnerabilities
        run: npm audit --audit-level=critical

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm run test:run
