name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      APP_ENV: ci
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://familyfinance-ci.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-anon-key' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'ci-publishable-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY || 'ci-service-role-key' }}
      ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL || secrets.ADMIN_EMAIL || 'admin@example.com' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Print CI environment source
        shell: bash
        run: |
          echo "CI is using environment values from GitHub variables/secrets when present, otherwise safe placeholders for lint/build/test."
          echo "NEXT_PUBLIC_SUPABASE_URL is set: $([ -n \"$NEXT_PUBLIC_SUPABASE_URL\" ] && echo yes || echo no)"
          echo "Supabase public key is set: $([ -n \"$NEXT_PUBLIC_SUPABASE_ANON_KEY$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY\" ] && echo yes || echo no)"
          echo "SUPABASE_SERVICE_ROLE_KEY is set: $([ -n \"$SUPABASE_SERVICE_ROLE_KEY\" ] && echo yes || echo no)"
          echo "ADMIN_EMAIL is set: $([ -n \"$ADMIN_EMAIL\" ] && echo yes || echo no)"

      - name: Install dependencies
        run: npm ci

      - name: Audit critical vulnerabilities
        run: npm audit --audit-level=critical

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm run test:run
