name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (optional)"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend-supabase:
    name: Deploy Backend (Supabase Migrations)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.ref }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate backend deploy secrets
        shell: bash
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error title=Missing secret::SUPABASE_DB_URL must be configured to deploy backend migrations."
            exit 1
          fi

      - name: Apply migrations to Supabase
        shell: bash
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          supabase db push --db-url "$SUPABASE_DB_URL"

  deploy-vercel:
    name: Deploy Frontend (Vercel Production)
    runs-on: ubuntu-latest
    needs: deploy-backend-supabase
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate frontend deploy secrets
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::error title=Missing variable::NEXT_PUBLIC_SUPABASE_URL must be configured in GitHub Actions repository variables."
            exit 1
          fi

          if [ -z "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::error title=Missing secret::NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY must be configured in GitHub Actions repository secrets."
            exit 1
          fi

          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error title=Missing secret::SUPABASE_SERVICE_ROLE_KEY must be configured in GitHub Actions repository secrets."
            exit 1
          fi

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error title=Missing secret::VERCEL_TOKEN must be configured to deploy on Vercel."
            exit 1
          fi

          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error title=Missing secret::VERCEL_ORG_ID must be configured for non-interactive Vercel project resolution in CI."
            exit 1
          fi

          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error title=Missing secret::VERCEL_PROJECT_ID must be configured for non-interactive Vercel project resolution in CI."
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Supabase public API key registration
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          response_file="$(mktemp)"
          status_code="$(curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
            "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/" \
            --header "apikey: $NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" \
            --header "Authorization: Bearer $NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY")"

          if grep --ignore-case --quiet --extended-regexp "invalid api key|unregistered api key" "$response_file"; then
            echo "::error title=Invalid Supabase public key::NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY is not registered for NEXT_PUBLIC_SUPABASE_URL."
            exit 1
          fi

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 500 ]; then
            echo "::error title=Supabase REST check failed::Supabase REST returned HTTP $status_code before Vercel deploy."
            exit 1
          fi

      - name: Sync Supabase environment to Vercel production
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          printf "%s" "$NEXT_PUBLIC_SUPABASE_URL" | vercel env add NEXT_PUBLIC_SUPABASE_URL production \
            --force \
            --yes \
            --token "$VERCEL_TOKEN"

          printf "%s" "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" | vercel env add NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY production \
            --force \
            --yes \
            --token "$VERCEL_TOKEN"

          printf "%s" "$SUPABASE_SERVICE_ROLE_KEY" | vercel env add SUPABASE_SERVICE_ROLE_KEY production \
            --force \
            --yes \
            --sensitive \
            --token "$VERCEL_TOKEN"

      - name: Pull Vercel project settings
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
